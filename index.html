<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <!-- zoom liberado (acessibilidade); o canvas usa Scale.FIT e não é afetado -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0d0d12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Idol Math ⚡ Tabuada Kpop Metal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/ui.css" />
</head>
<body>
  <div id="game-root"></div>

  <!-- Camada de UI em HTML (telas de menu) sobreposta ao canvas -->
  <div id="ui-root" hidden>
    <section class="ui-screen" id="screen-ajustes" hidden>
      <div class="ui-card">
        <h1 class="ui-title">⚙️ AJUSTES</h1>
        <button class="ui-toggle" type="button" data-cfg="musica" aria-pressed="false"></button>
        <button class="ui-toggle" type="button" data-cfg="efeitos" aria-pressed="false"></button>
        <button class="ui-toggle" type="button" data-cfg="timer" aria-pressed="false"></button>
        <button class="ui-toggle" type="button" data-cfg="voz" aria-pressed="false"></button>
        <p class="ui-sub ajustes-backup-titulo">Backup do progresso</p>
        <div class="ajustes-backup">
          <button class="ui-btn ab-exportar" type="button" data-acao="exportar">💾 Exportar</button>
          <button class="ui-btn ab-importar" type="button" data-acao="importar">📥 Importar</button>
        </div>
        <input id="importar-arquivo" type="file" accept="application/json,.json" hidden>
        <button class="ui-btn ui-voltar" type="button" data-acao="menu">↩  Menu</button>
      </div>
    </section>

    <section class="ui-screen" id="screen-conquistas" hidden>
      <div class="ui-card">
        <h1 class="ui-title">🏅 CONQUISTAS</h1>
        <p class="ui-sub" id="conq-contagem"></p>
        <div class="ui-list" id="conq-lista"></div>
        <button class="ui-btn ui-voltar" type="button" data-acao="voltar">↩  Menu</button>
      </div>
    </section>

    <section class="ui-screen" id="screen-progresso" hidden>
      <div class="ui-card">
        <h1 class="ui-title">📊 PROGRESSO</h1>
        <p class="ui-sub" id="prog-nome"></p>
        <div id="prog-corpo"></div>
        <button class="ui-btn ui-voltar" type="button" data-acao="voltar">↩  Menu</button>
      </div>
    </section>

    <section class="ui-screen" id="screen-loja" hidden>
      <div class="ui-card">
        <h1 class="ui-title">🛍️ LOJA</h1>
        <p class="ui-sub" id="loja-saldo"></p>
        <div id="loja-corpo"></div>
        <p class="ui-msg" id="loja-msg"></p>
        <button class="ui-btn ui-voltar" type="button" data-acao="voltar">↩  Menu</button>
      </div>
    </section>

    <section class="ui-screen" id="screen-menu" hidden>
      <div class="ui-card">
        <h1 class="ui-title menu-titulo">IDOL MATH</h1>
        <div id="menu-corpo"></div>
      </div>
    </section>

    <section class="ui-screen" id="screen-grade" hidden>
      <div class="ui-card">
        <h1 class="ui-title">🗺️ FASES</h1>
        <p class="ui-sub" id="grade-sub"></p>
        <div id="grade-corpo"></div>
        <button class="ui-btn ui-voltar" type="button" data-acao="menu">↩  Menu</button>
      </div>
    </section>

    <section class="ui-screen" id="screen-perfis" hidden>
      <div class="ui-card">
        <h1 class="ui-title" id="perfis-titulo">QUEM VAI JOGAR?</h1>
        <div id="perfis-corpo"></div>
      </div>
    </section>

    <section class="ui-screen" id="screen-heroi" hidden>
      <div class="ui-card">
        <h1 class="ui-title">🔄 TROCAR AVATAR</h1>
        <div id="heroi-corpo"></div>
        <button class="ui-btn ui-voltar" type="button" data-acao="menu">↩  Menu</button>
      </div>
    </section>

    <section class="ui-screen" id="screen-resultado" hidden>
      <div class="ui-card">
        <h1 class="ui-title" id="resultado-titulo"></h1>
        <div id="resultado-corpo"></div>
      </div>
    </section>

    <section class="ui-screen" id="screen-confirma" hidden>
      <div class="ui-card">
        <h1 class="ui-title" style="color:#ff3030">REMOVER?</h1>
        <div id="confirma-corpo"></div>
      </div>
    </section>

    <section class="ui-screen" id="screen-treino" hidden>
      <div class="ui-card">
        <h1 class="ui-title" style="color:#36d96b">📚 TREINO</h1>
        <p class="ui-sub">Escolha o que treinar</p>
        <div id="treino-corpo"></div>
        <button class="ui-btn ui-voltar" type="button" data-acao="menu">↩  Menu</button>
      </div>
    </section>
  </div>

  <!-- Camada de gameplay (botões de resposta + pausa) sobre o canvas -->
  <div id="jogo-root" hidden>
    <!-- pergunta/feedback para leitores de tela (a conta é desenhada no canvas) -->
    <p id="jogo-anuncio" class="sr-only" role="status" aria-live="polite"></p>
    <div id="jogo-respostas">
      <button class="resp-btn rosa" type="button"></button>
      <button class="resp-btn roxo" type="button"></button>
      <button class="resp-btn ciano" type="button"></button>
      <button class="resp-btn ouro" type="button"></button>
    </div>
    <button id="jogo-pausa-btn" type="button" hidden>⏸</button>
    <div id="jogo-modal" hidden>
      <div class="jogo-modal-card">
        <h1 class="ui-title">⏸ PAUSA</h1>
        <button class="ui-btn jm-continuar" type="button" data-pausa="continuar">▶  Continuar</button>
        <button class="ui-btn jm-fases" type="button" data-pausa="fases">🗺  Fases</button>
        <button class="ui-btn ui-voltar" type="button" data-pausa="menu">🏠  Menu</button>
      </div>
    </div>
  </div>

  <!-- Phaser 3 (vendorizado localmente, funciona offline) -->
  <!-- defer: não bloqueia a renderização; a ordem dos scripts é preservada -->
  <script defer src="vendor/phaser.min.js"></script>

  <!-- Data (puro, sem dependências — carrega antes do core) -->
  <script defer src="js/data/fases.js"></script>
  <script defer src="js/data/herois.js"></script>
  <script defer src="js/data/roupas.js"></script>
  <script defer src="js/data/efeitos.js"></script>
  <script defer src="js/data/conquistas.js"></script>

  <!-- Core (Storage usa MathEngine.chaveFato e JOGO.moedas; Regras usa JOGO) -->
  <script defer src="js/core/MathEngine.js"></script>
  <script defer src="js/core/Regras.js"></script>
  <script defer src="js/core/Storage.js"></script>
  <script defer src="js/core/Audio.js"></script>
  <script defer src="js/core/UI.js"></script>
  <script defer src="js/core/Util.js"></script>

  <!-- Cenas Phaser: só o gameplay (Boot gera texturas; navegação é HTML) -->
  <script defer src="js/scenes/BootScene.js"></script>
  <script defer src="js/scenes/GameScene.js"></script>
  <script defer src="js/scenes/TrainScene.js"></script>

  <!-- Camada de UI em HTML -->
  <script defer src="js/ui/screens.js"></script>
  <script defer src="js/ui/gameui.js"></script>

  <!-- Bootstrap -->
  <script defer src="js/main.js"></script>

  <!-- Banner "nova versão" (aparece quando um SW novo fica em espera) -->
  <button id="atualizar-banner" type="button" hidden>
    🎉 Nova versão disponível — toque para atualizar
  </button>

  <!-- Service Worker (PWA offline) + atualização sob demanda -->
  <script>
    if ("serviceWorker" in navigator) {
      // quando o SW novo assume o controle (após o toque no banner), recarrega 1x
      let recarregou = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (recarregou) return;
        recarregou = true;
        window.location.reload();
      });

      // versão nova fica em "waiting" até o jogador tocar no banner — assim a
      // atualização nunca recarrega a página no meio de uma partida
      const banner = document.getElementById("atualizar-banner");
      const oferecerAtualizacao = (reg) => {
        if (!reg.waiting || !navigator.serviceWorker.controller || !banner) return;
        banner.hidden = false;
        banner.onclick = () => {
          banner.hidden = true;
          reg.waiting.postMessage({ tipo: "SKIP_WAITING" });
        };
      };

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then((reg) => {
          // procura atualização a cada carregamento
          reg.update();
          oferecerAtualizacao(reg); // já pode haver uma versão esperando
          reg.addEventListener("updatefound", () => {
            const novo = reg.installing;
            if (!novo) return;
            novo.addEventListener("statechange", () => {
              if (novo.state === "installed") oferecerAtualizacao(reg);
            });
          });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
